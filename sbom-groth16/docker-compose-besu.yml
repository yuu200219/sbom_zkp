version: "3.9"
services:
  besu-node-1:
    image: hyperledger/besu:latest
    container_name: besu-node-1
    ports:
      - "8545:8545"   # RPC HTTP
      - "30303:30303" # P2P besu node communication
    volumes:
      - ./QBFT-Network/genesis.json:/config/genesis.json
      - ./QBFT-Network/Node-1/data:/data
    command: >
      --data-path=/data
      --genesis-file=/config/genesis.json
      --p2p-host=172.18.0.11
      --rpc-http-enabled
      --rpc-http-api=ETH,NET,QBFT
      --host-allowlist=*
      --rpc-http-cors-origins=all
      --min-gas-price=0
      --profile=ENTERPRISE
      --sync-mode=FULL
      --data-storage-format=FOREST
    networks:
      zknet:
        ipv4_address: 172.18.0.11

  besu-node-2:
    image: hyperledger/besu:latest
    container_name: besu-node-2
    ports:
      - "8546:8545"
      - "30304:30304"
    volumes:
      - ./QBFT-Network/genesis.json:/config/genesis.json
      - ./QBFT-Network/Node-2/data:/data
    command: >
      --data-path=/data
      --genesis-file=/config/genesis.json
      --p2p-host=172.18.0.12
      --bootnodes=enode://13fdecfdd2ca05d42f1b7050527101eaf111d26a7bc57aa741b063a4ce47f85e7ad6091a25338e168e3bd85f2f8251e2fe7db063f37199b4c7ac77d48847010e@172.18.0.11:30303
      --p2p-port=30304
      --rpc-http-enabled
      --rpc-http-api=ETH,NET,QBFT
      --host-allowlist=*
      --rpc-http-cors-origins=all
      --rpc-http-port=8545
      --min-gas-price=0
      --profile=ENTERPRISE
      --sync-mode=FULL
      --data-storage-format=FOREST
    depends_on:
      - besu-node-1
    networks:
      zknet:
        ipv4_address: 172.18.0.12

  besu-node-3:
    image: hyperledger/besu:latest
    container_name: besu-node-3
    ports:
      - "8547:8545"
      - "30305:30305"
    volumes:
      - ./QBFT-Network/genesis.json:/config/genesis.json
      - ./QBFT-Network/Node-3/data:/data
    command: >
      --data-path=/data
      --genesis-file=/config/genesis.json
      --p2p-host=172.18.0.13
      --bootnodes=enode://13fdecfdd2ca05d42f1b7050527101eaf111d26a7bc57aa741b063a4ce47f85e7ad6091a25338e168e3bd85f2f8251e2fe7db063f37199b4c7ac77d48847010e@172.18.0.11:30303
      --p2p-port=30305
      --rpc-http-enabled
      --rpc-http-api=ETH,NET,QBFT
      --host-allowlist=*
      --rpc-http-cors-origins=all
      --rpc-http-port=8545
      --min-gas-price=0
      --profile=ENTERPRISE
      --sync-mode=FULL
      --data-storage-format=FOREST
    depends_on:
      - besu-node-1
    networks:
      zknet:
        ipv4_address: 172.18.0.13
  besu-node-4:
    image: hyperledger/besu:latest
    container_name: besu-node-4
    ports:
      - "8548:8545"
      - "30306:30306"
    volumes:
      - ./QBFT-Network/genesis.json:/config/genesis.json
      - ./QBFT-Network/Node-4/data:/data
    command: >
      --data-path=/data
      --genesis-file=/config/genesis.json
      --p2p-host=172.18.0.14
      --bootnodes=enode://13fdecfdd2ca05d42f1b7050527101eaf111d26a7bc57aa741b063a4ce47f85e7ad6091a25338e168e3bd85f2f8251e2fe7db063f37199b4c7ac77d48847010e@172.18.0.11:30303
      --p2p-port=30306
      --rpc-http-enabled
      --rpc-http-api=ETH,NET,QBFT
      --host-allowlist=*
      --rpc-http-cors-origins=all
      --rpc-http-port=8545
      --min-gas-price=0
      --profile=ENTERPRISE
      --sync-mode=FULL
      --data-storage-format=FOREST
    depends_on:
      - besu-node-1
    networks:
      zknet:
        ipv4_address: 172.18.0.14

networks:
  zknet:
    external: true
    name: sbom-groth16_zknet
